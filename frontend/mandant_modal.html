<!-- Mandant Modal -->
<div id="mandantModal" class="modal hidden">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2>🏢 Neuer Mandant</h2>
            <button class="modal-close" onclick="closeMandantModal()">×</button>
        </div>
        <div class="modal-body">
            <form id="mandantForm" onsubmit="submitMandant(event)">
                <h3>Stammdaten</h3>
                <div class="form-group">
                    <label>Firma *</label>
                    <input type="text" id="mandantFirma" required placeholder="z.B. Maler Müller GmbH">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Straße & Hausnr.</label>
                        <input type="text" id="mandantStrasse" placeholder="Hauptstraße 1">
                    </div>
                    <div class="form-group">
                        <label>PLZ & Ort</label>
                        <input type="text" id="mandantOrt" placeholder="12345 Berlin">
                    </div>
                </div>

                <div class="form-group">
                    <label>Geschäftsführer</label>
                    <input type="text" id="mandantGF" placeholder="Max Mustermann">
                </div>

                <h3>Bankverbindung</h3>
                <div class="form-group">
                    <label>IBAN</label>
                    <input type="text" id="mandantIBAN" placeholder="DE89 3704 0044 0532 0130 00">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>BIC</label>
                        <input type="text" id="mandantBIC" placeholder="COBADEFFXXX">
                    </div>
                    <div class="form-group">
                        <label>Bankname</label>
                        <input type="text" id="mandantBank" placeholder="Commerzbank">
                    </div>
                </div>

                <div id="mandantStatus"></div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeMandantModal()">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">Mandant anlegen</button>
                </div>
            </form>
        </div>
    </div>
</div>
